<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var storedTheme = window.localStorage.getItem('theme');
          var theme = storedTheme === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (error) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <!-- Primary Meta -->
    <title>Pulse by elevendots — Knowledge Navigator</title>
    <meta name="description" content="Signal over noise, shaped into clarity. A curated knowledge navigator across tech, research, science, world affairs, and philosophy. Updated every hour from 165+ sources." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pulse.elevendots.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pulse by elevendots" />
    <meta property="og:title" content="Pulse — Knowledge Navigator" />
    <meta property="og:description" content="Signal over noise, shaped into clarity. A curated knowledge navigator across tech, research, science, world affairs, and philosophy. Updated hourly from 165+ sources." />
    <meta property="og:url" content="https://pulse.elevendots.dev/" />
    <meta property="og:image" content="https://pulse.elevendots.dev/og/og-homepage.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulse — Knowledge Navigator" />
    <meta name="twitter:description" content="Signal over noise, shaped into clarity. A curated knowledge navigator across tech, research, science, world affairs, and philosophy. Updated hourly from 165+ sources." />
    <meta name="twitter:image" content="https://pulse.elevendots.dev/og/og-homepage.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#f0f0ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08080f" media="(prefers-color-scheme: dark)" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <style>
        .noscript-container { max-width: 640px; margin: 0 auto; padding: 2rem; font-family: 'DM Sans', sans-serif; }
        .noscript-container h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; }
        .noscript-container p { font-size: 14px; color: #555; line-height: 1.6; }
      </style>
      <div class="noscript-container">
        <h1>Pulse by elevendots</h1>
        <p>
          Signal over noise, shaped into clarity. A curated knowledge navigator
          for tech, science, and philosophy. Updated every hour from 100+ sources.
        </p>
        <p>
          For direct access to sources, visit the publisher websites directly.
          Sources can request removal: support@elevendots.ai
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
